---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true

- name: Configure APT periodic updates
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Configure unattended-upgrades policy
  ansible.builtin.template:
    src: 52jtprojects-unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/52jtprojects-unattended-upgrades
    owner: root
    group: root
    mode: "0644"
