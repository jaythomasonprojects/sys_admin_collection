---
- name: Set git user name
  community.general.git_config:
    name: 'user.name'
    scope: 'global'
    value: "{{ config_git_user_name }}"
  when: config_git_user_name | length > 0

- name: Set git user email
  community.general.git_config:
    name: 'user.email'
    scope: 'global'
    value: "{{ config_git_user_email }}"
  when: config_git_user_email | length > 0
