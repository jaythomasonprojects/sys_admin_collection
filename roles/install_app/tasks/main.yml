---
- name: Install dnf packages
  ansible.builtin.include_tasks: 'dnf.yml'
  when:
    - install_app_packages | length > 0
    - ansible_facts.pkg_mgr in ['dnf', 'dnf5']

- name: Install apt packages
  ansible.builtin.include_tasks: 'apt.yml'
  when:
    - install_app_packages | length > 0
    - ansible_facts.pkg_mgr == 'apt'

- name: Skip Debian package installers on non-APT hosts
  ansible.builtin.debug:
    msg: >-
      Skipping install_app_debs because this host uses
      {{ ansible_facts.pkg_mgr }} rather than APT.
  when:
    - install_app_debs | length > 0
    - ansible_facts.pkg_mgr != 'apt'

- name: Install Debian package items
  ansible.builtin.include_tasks: 'deb_package.yml'
  loop: '{{ install_app_debs }}'
  loop_control:
    loop_var: install_app_deb
    label: >-
      {{ install_app_deb.name
      | default(install_app_deb.dest
      | default(install_app_deb.deb
      | default('unnamed deb'))) }}
  when:
    - install_app_debs | length > 0
    - ansible_facts.pkg_mgr == 'apt'
    - install_app_deb.enabled | default(true)

- name: Install flatpaks
  ansible.builtin.include_tasks: 'flatpaks.yml'
  when: install_app_flatpaks | length > 0
