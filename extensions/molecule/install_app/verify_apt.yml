---
- name: Query jq package status with dpkg-query
  ansible.builtin.command:
    argv:
      - "dpkg-query"
      - "-W"
      - "-f=${Status}"
      - "{{ expected_package_name }}"
  register: install_app_package_status
  changed_when: false

- name: Run jq to prove the binary is available
  ansible.builtin.command:
    argv:
      - "jq"
      - "--version"
  register: install_app_jq_version
  changed_when: false

- name: Assert jq package installation on APT hosts
  ansible.builtin.assert:
    that:
      - "expected_package_name in ansible_facts.packages"
      - "install_app_package_status.stdout == 'install ok installed'"
      - "install_app_jq_version.rc == 0"
    fail_msg: >-
      install_app did not install jq as expected on the APT host.
      package_facts={{ ansible_facts.packages.get(expected_package_name, []) }}
      dpkg-query={{ install_app_package_status.stdout | default('missing') }}
      jq_version={{ install_app_jq_version.stdout | default('missing') }}

- name: Query local Debian fixture package status with dpkg-query
  ansible.builtin.command:
    argv:
      - "dpkg-query"
      - "-W"
      - "-f=${Status}"
      - "install-app-fixture"
  register: install_app_fixture_package_status
  changed_when: false

- name: Run local Debian fixture executable
  ansible.builtin.command:
    argv:
      - "install-app-fixture"
  register: install_app_fixture_output
  changed_when: false

- name: Assert local Debian package installation on APT hosts
  ansible.builtin.assert:
    that:
      - "'install-app-fixture' in ansible_facts.packages"
      - "install_app_fixture_package_status.stdout == 'install ok installed'"
      - "install_app_fixture_output.stdout == 'install-app-fixture'"
    fail_msg: >-
      install_app did not install the local Debian fixture package as expected.
      package_facts={{ ansible_facts.packages.get('install-app-fixture', []) }}
      dpkg-query={{
        install_app_fixture_package_status.stdout | default('missing')
      }}
      fixture_output={{
        install_app_fixture_output.stdout | default('missing')
      }}
