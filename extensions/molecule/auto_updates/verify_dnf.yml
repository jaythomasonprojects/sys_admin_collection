---
- name: Read rendered DNF automatic config
  ansible.builtin.slurp:
    src: "/etc/dnf/automatic.conf"
  register: auto_updates_dnf_config

- name: Check whether dnf-automatic.timer is enabled
  ansible.builtin.command:
    argv:
      - "systemctl"
      - "is-enabled"
      - "dnf-automatic.timer"
  register: auto_updates_timer_enabled
  changed_when: false

- name: Check whether dnf-automatic.timer is active
  ansible.builtin.command:
    argv:
      - "systemctl"
      - "is-active"
      - "dnf-automatic.timer"
  register: auto_updates_timer_active
  changed_when: false

- name: Decode rendered DNF config
  ansible.builtin.set_fact:
    actual_dnf_automatic: "{{ auto_updates_dnf_config.content | b64decode }}"

- name: Assert dnf-automatic configuration and timer state
  ansible.builtin.assert:
    that:
      - "'dnf-automatic' in ansible_facts.packages"
      - "actual_dnf_automatic.strip() == expected_dnf_automatic.strip()"
      - "auto_updates_timer_enabled.stdout == 'enabled'"
      - "auto_updates_timer_active.stdout == 'active'"
    fail_msg: >-
      auto_updates did not configure dnf-automatic as expected.
      package_facts={{ ansible_facts.packages.get('dnf-automatic', []) }}
      enabled={{ auto_updates_timer_enabled.stdout | default('missing') }}
      active={{ auto_updates_timer_active.stdout | default('missing') }}
      config={{ actual_dnf_automatic | default('missing') }}
