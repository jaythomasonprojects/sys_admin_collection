---
dependency:
  name: 'galaxy'

driver:
  name: 'docker'

platforms:
  - name: 'ubuntu'
    command: 'sleep infinity'
    image: 'docker.io/geerlingguy/docker-ubuntu2204-ansible:latest'
    pre_build_image: true

provisioner:
  name: 'ansible'

scenario:
  name: 'create_users'
  test_sequence:
    - 'dependency'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'idempotence'
    - 'verify'
    - 'cleanup'
    - 'destroy'

verifier:
  name: 'ansible'
