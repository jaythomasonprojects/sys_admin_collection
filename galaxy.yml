---
# The checkout directory still uses jtprojects.infra for now, but the
# Galaxy-facing collection identity has cut over to jaythomasonprojects.sys_admin.
namespace: jaythomasonprojects
name: sys_admin
version: "0.1.0"
readme: README.md
authors:
  - Jay Thomason
description: >-
  System administration roles for local user bootstrap and git
  configuration, with additional extracted roles staged for future validation
license:
  - MIT
tags:
  - automation
  - sysadmin
  - linux
# Keep metadata URLs on the current source repo until the dedicated
# ansible-collection-sys_admin repository/folder rename is completed.
repository: "https://github.com/jaythomasonprojects/me-playbooks"
documentation: "https://github.com/jaythomasonprojects/me-playbooks"
homepage: "https://github.com/jaythomasonprojects/me-playbooks"
issues: "https://github.com/jaythomasonprojects/me-playbooks/issues"
dependencies:
  ansible.posix: "*"
  community.general: "*"
build_ignore:
  - ".ansible"
  - ".cache"
  - ".gitignore"
  - ".molecule"
  - ".venv"
  - "*.tar.gz"
